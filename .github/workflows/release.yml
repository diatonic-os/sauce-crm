name: Release

# Builds the plugin and attaches main.js / manifest.json / styles.css to a
# GitHub Release matching the version field in manifest.json. Obsidian's
# community plugin manifest pulls these assets by exact name.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Validate manifest version matches tag
        run: |
          MV=$(node -p "require('./manifest.json').version")
          if [ "$MV" != "$TAG" ]; then
            echo "manifest.json version ($MV) does not match tag ($TAG)"
            exit 1
          fi
      - name: Typecheck + test
        run: |
          npm run typecheck
          npm test
      - name: Build production bundle
        run: npm run build
      - name: Verify release artifacts
        run: |
          for f in main.js manifest.json styles.css; do
            test -f "$f" || (echo "missing artifact: $f" && exit 1)
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Sauce CRM ${{ env.TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            main.js
            manifest.json
            styles.css
